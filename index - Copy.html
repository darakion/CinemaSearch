<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cinema Listings</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    select, input {
      padding: 8px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    th {
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

<h1>🎬 Cinema Listings</h1>

<div class="filters">
  <select id="cinemaFilter">
    <option value="">All Cinemas</option>
  </select>

  <input type="date" id="dateFilter">

  <input type="text" id="movieFilter" placeholder="Search movie...">
</div>

<table id="table">
  <thead>
    <tr>
      <th>Movie Name</th>
      <th>Day</th>
      <th>Time</th>
      <th>Date</th>
      <th>Screen</th>
      <th>Cinema Name</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
let allData = [];

// Convert "12.4.2026 г." → "2026-04-12"
function normalizeDate(dateStr) {
  if (!dateStr) return "";

  const clean = dateStr.replace(" г.", "");
  const [day, month, year] = clean.split(".");

  return `${year}-${month.padStart(2, "0")}-${day.padStart(2, "0")}`;
}

// Load CSV
Papa.parse("data.csv", {
  download: true,
  header: true,
  complete: function(results) {

    allData = results.data
      .filter(row => row["Movie Name"])
      .map(row => ({
        ...row,
        normalizedDate: normalizeDate(row["Date"])
      }));

    console.log("Loaded rows:", allData.length);

    populateCinemaFilter();
    renderTable(allData);
  }
});

// Populate cinema dropdown
function populateCinemaFilter() {
  const cinemas = [...new Set(allData.map(d => d["Cinema Name"]))];
  const select = document.getElementById("cinemaFilter");

  cinemas.forEach(cinema => {
    const option = document.createElement("option");
    option.value = cinema;
    option.textContent = cinema;
    select.appendChild(option);
  });
}

// Render table
function renderTable(data) {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row["Movie Name"]}</td>
      <td>${row["Day"]}</td>
      <td>${row["Time"]}</td>
      <td>${row["Date"]}</td>
      <td>${row["Screen"]}</td>
      <td>${row["Cinema Name"]}</td>
    `;

    tbody.appendChild(tr);
  });
}

// Apply filters
function applyFilters() {
  const cinema = document.getElementById("cinemaFilter").value;
  const date = document.getElementById("dateFilter").value;
  const movie = document.getElementById("movieFilter").value.toLowerCase();

  const filtered = allData.filter(row => {
    return (
      (!cinema || row["Cinema Name"] === cinema) &&
      (!date || row.normalizedDate === date) &&
      (!movie || row["Movie Name"].toLowerCase().includes(movie))
    );
  });

  renderTable(filtered);
}

// Events
document.getElementById("cinemaFilter").addEventListener("change", applyFilters);
document.getElementById("dateFilter").addEventListener("change", applyFilters);
document.getElementById("movieFilter").addEventListener("input", applyFilters);
</script>

</body>
</html>
