<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cinema Listings</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    select, input {
      padding: 8px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    th {
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

<h1>🎬 Cinema Listings</h1>

<div class="filters">
  <select id="cinemaFilter">
    <option value="">All Cinemas</option>
  </select>

  <input type="date" id="dateFilter">

  <input type="text" id="movieFilter" placeholder="Search movie...">
</div>

<table id="table">
  <thead>
    <tr>
      <th>Movie Name</th>
      <th>Day</th>
      <th>Time</th>
      <th>Date</th>
      <th>Screen</th>
      <th>Cinema Name</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
let allData = [];

// Format date as yyyy.MM.dd
function formatDate(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const d = String(dt.getDate()).padStart(2, "0");
  return `${y}.${m}.${d}`;
}

// Get Monday-based weekday index (Mon=0, Sun=6)
function getWeekdayIndex(dt) {
  return (dt.getDay() + 6) % 7;
}

// Load CSV
Papa.parse("data.csv", {
  download: true,
  header: true,
  complete: function(results) {

    allData = results.data
      .filter(row => row["Movie Name"])
      .map(row => {
        const dt = new Date(row["DateTime"]);

        if (isNaN(dt)) {
          console.warn("Invalid date:", row["DateTime"]);
        }

        // LOCAL date (fix timezone issue)
        const year = dt.getFullYear();
        const month = String(dt.getMonth() + 1).padStart(2, "0");
        const day = String(dt.getDate()).padStart(2, "0");

        return {
          ...row,
          parsedDate: dt,
          dateOnly: `${year}-${month}-${day}`,
          formattedDate: formatDate(dt),
          weekdayIndex: getWeekdayIndex(dt)
        };
      });

    console.log("Loaded rows:", allData.length);

    populateCinemaFilter();
    renderTable(allData);
  }
});

// Populate cinema dropdown
function populateCinemaFilter() {
  const cinemas = [...new Set(allData.map(d => d["Cinema Name"]))];
  const select = document.getElementById("cinemaFilter");

  cinemas.forEach(cinema => {
    const option = document.createElement("option");
    option.value = cinema;
    option.textContent = cinema;
    select.appendChild(option);
  });
}

// Sort by Date → Time
function sortData(data) {
  return data.sort((a, b) => {
    if (a.parsedDate - b.parsedDate !== 0) {
      return a.parsedDate - b.parsedDate;
    }
    return a["Time"].localeCompare(b["Time"]);
  });
}

// Render table
function renderTable(data) {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  const sorted = sortData([...data]);

  sorted.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row["Movie Name"]}</td>
      <td>${row["Day"]}</td>
      <td>${row["Time"]}</td>
      <td>${row.formattedDate}</td>
      <td>${row["Screen"]}</td>
      <td>${row["Cinema Name"]}</td>
    `;

    tbody.appendChild(tr);
  });
}

// Apply filters
function applyFilters() {
  const cinema = document.getElementById("cinemaFilter").value;
  const date = document.getElementById("dateFilter").value;
  const movie = document.getElementById("movieFilter").value.toLowerCase();

  const filtered = allData.filter(row => {
    return (
      (!cinema || row["Cinema Name"] === cinema) &&
      (!date || row.dateOnly === date) &&
      (!movie || row["Movie Name"].toLowerCase().includes(movie))
    );
  });

  renderTable(filtered);
}

// Event listeners
document.getElementById("cinemaFilter").addEventListener("change", applyFilters);
document.getElementById("dateFilter").addEventListener("change", applyFilters);
document.getElementById("movieFilter").addEventListener("input", applyFilters);
</script>

</body>
</html>
