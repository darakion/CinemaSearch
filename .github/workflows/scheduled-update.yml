name: Scheduled Update for Pages

on:
  schedule:
    - cron: '0 * * * *'   # every hour at minute 0
  workflow_dispatch: {}   # manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Restore cached PowerShell modules
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/psmodules
          key: ps-modules-windows-v1
          restore-keys: ps-modules-windows-

      - name: Ensure NuGet provider and PSGallery
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

      - name: Save required module to cache folder
        shell: pwsh
        run: |
          $cache = Join-Path $env:RUNNER_TEMP 'psmodules'
          New-Item -ItemType Directory -Path $cache -Force | Out-Null
          # Replace SomeModule with the module you need
          $moduleName = 'PSParseHTML'
          # Save-Module will download module files into the cache folder if not present
          if (-not (Test-Path (Join-Path $cache $moduleName))) {
            Save-Module -Name $moduleName -Path $cache -Force -Repository PSGallery
          } else {
            Write-Output "Module $moduleName already in cache"
          }

      - name: Add cache folder to PSModulePath and import module
        shell: pwsh
        run: |
          $cache = Join-Path $env:RUNNER_TEMP 'psmodules'
          $env:PSModulePath = "$cache;$env:PSModulePath"
          Import-Module PSParseHTML -Force
          Write-Output "Imported module PSParseHTML from $cache"

      - name: Run PowerShell script from repo
        shell: pwsh
        run: pwsh -File ./CinemaSearcherExportTrigger.ps1

      - name: Show git status
        run: git status --porcelain

      - name: Commit and push if changed
        run: |
          if ((git status --porcelain) -ne "") {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data.json
            $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            git commit -m "Automated update: data.json at $ts"
            git push
          } else {
            Write-Output "No changes to commit"
          }

