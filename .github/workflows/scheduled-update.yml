name: Scheduled Update for Pages

on:
  schedule:
    - cron: '0 1 * * *'   # every Day at 1:00
  workflow_dispatch: {}   # manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Restore cached PowerShell modules
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/psmodules
          key: ps-modules-windows-v1
          restore-keys: |
            ps-modules-windows-
            ps-modules-

      - name: Ensure NuGet provider and PSGallery
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

      - name: Save required module to cache folder
        shell: pwsh
        run: |
          $cache = Join-Path $env:RUNNER_TEMP 'psmodules'
          New-Item -ItemType Directory -Path $cache -Force | Out-Null
          $moduleName = 'PSParseHTML'
          # Save-Module will download module files into the cache folder if not present
          if (-not (Test-Path (Join-Path $cache $moduleName))) {
            Save-Module -Name $moduleName -Path $cache -Force -Repository PSGallery
          } else {
            Write-Host "Module $moduleName already in cache"
          }

      - name: Persist PSModulePath for subsequent steps
        shell: pwsh
        run: |
          $cache = Join-Path $env:RUNNER_TEMP 'psmodules'
          $newPath = "$cache;$env:PSModulePath"
          # Persist PSModulePath for later steps
          Add-Content -Path $env:GITHUB_ENV -Value "PSModulePath=$newPath"
          Write-Host "Persisted PSModulePath: $newPath"

      - name: Verify module is available
        shell: pwsh
        run: |
          Write-Host "PSModulePath: $env:PSModulePath"
          $cache = Join-Path $env:RUNNER_TEMP 'psmodules'
          Write-Host "Cache folder contents (top level):"
          Get-ChildItem -Path $cache -Force | ForEach-Object { Write-Host $_.FullName }
          Write-Host "Modules found by PowerShell:"
          Get-Module -ListAvailable PSParseHTML | Format-List -Property Name,Version,Path

      - name: Run PowerShell script from repo
        shell: pwsh
        run: pwsh -File ./CinemaSearcherExportTrigger.ps1

      - name: Show git status
        shell: pwsh
        run: git status --porcelain

      - name: Commit and push if changed
        shell: pwsh
        run: |
          $status = git status --porcelain
          if ($status) {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.csv
            $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            git commit -m "Automated update: data.csv at $ts"
            git push
          } else {
            Write-Host "No changes to commit"
          }
